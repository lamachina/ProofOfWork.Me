<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PowID long-term modeled value in sats</title>
  <desc id="desc">Linear line chart showing modeled ProofOfWork ID network value in billions of sats over 24 months.</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="92" y="42" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">PowID Long-Term Value: Sats</text>
  <text x="92" y="69" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="14">Linear scale. Y-axis is billions of sats. Model: projected IDs^2 * current sats density.</text>

  <g stroke="#d6d0c4" stroke-width="1">
    <line x1="92" y1="454" x2="912" y2="454"/>
    <line x1="92" y1="378.4" x2="912" y2="378.4"/>
    <line x1="92" y1="302.8" x2="912" y2="302.8"/>
