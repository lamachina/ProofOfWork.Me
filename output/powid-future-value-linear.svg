<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PowID future value scenarios on a linear scale</title>
  <desc id="desc">Line chart showing modeled PowID value scenarios at 94, 110, 250, 500, and 1000 confirmed IDs using current unique balance density.</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="88" y="44" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">PowID Value Scenarios</text>
  <text x="88" y="72" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="15">Linear scale. Uses current 268.69 sats per n^2 unit as a simple density model.</text>
  <line x1="88" y1="458" x2="916" y2="458" stroke="#262626" stroke-width="1.5"/>
  <line x1="88" y1="56" x2="88" y2="458" stroke="#262626" stroke-width="1.5"/>
  <g stroke="#d6d0c4" stroke-width="1">
    <line x1="88" y1="383.6" x2="916" y2="383.6"/>
    <line x1="88" y1="309.1" x2="916" y2="309.1"/>
    <line x1="88" y1="234.7" x2="916" y2="234.7"/>
    <line x1="88" y1="160.2" x2="916" y2="160.2"/>
    <line x1="88" y1="85.8" x2="916" y2="85.8"/>
  </g>
  <g fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="13">
    <text x="55" y="462">0</text>
    <text x="18" y="389">50M</text>
    <text x="10" y="314">100M</text>
    <text x="10" y="240">150M</text>
    <text x="10" y="165">200M</text>
    <text x="10" y="91">250M</text>
  </g>
  <path d="M88.0,454.5 L295.0,453.2 L502.0,433.0 L709.0,358.0 L916.0,58.0" fill="none" stroke="#be123c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#be123c" stroke="#f7f4ec" stroke-width="3">
    <circle cx="88" cy="454.5" r="7"/>
    <circle cx="295" cy="453.2" r="7"/>
    <circle cx="502" cy="433.0" r="7"/>
    <circle cx="709" cy="358.0" r="7"/>
    <circle cx="916" cy="58.0" r="7"/>
  </g>
  <g fill="#111111" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
    <text x="48" y="435">2.37M</text>
    <text x="255" y="434">3.25M</text>
    <text x="458" y="417">16.79M</text>
    <text x="665" y="342">67.17M</text>
    <text x="861" y="43">268.69M</text>
  </g>
