    <line x1="92" y1="76" x2="912" y2="76"/>
  </g>
  <line x1="92" y1="454" x2="912" y2="454" stroke="#262626" stroke-width="1.5"/>
  <line x1="92" y1="76" x2="92" y2="454" stroke="#262626" stroke-width="1.5"/>

  <g fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="13">
