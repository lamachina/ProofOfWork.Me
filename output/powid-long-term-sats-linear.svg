  <path d="M92.0,454.0 L297.0,445.1 L502.0,419.2 L707.0,376.1 L912.0,316.2" fill="none" stroke="#c2410c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M92.0,454.0 L297.0,429.9 L502.0,359.9 L707.0,243.4 L912.0,81.6" fill="none" stroke="#be123c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

