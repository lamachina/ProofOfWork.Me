<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PowID n squared network potential on a linear scale</title>
  <desc id="desc">Line chart showing n squared network potential from May 7 to May 11, 2026, growing from 9 to 8836.</desc>
  <rect width="960" height="540" fill="#f7f4ec"/>
  <text x="88" y="44" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">PowID Network Potential</text>
  <text x="88" y="72" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="15">Linear scale. Network potential = confirmed PowIDs ^ 2.</text>
  <line x1="88" y1="458" x2="916" y2="458" stroke="#262626" stroke-width="1.5"/>
  <line x1="88" y1="56" x2="88" y2="458" stroke="#262626" stroke-width="1.5"/>
  <g stroke="#d6d0c4" stroke-width="1">
    <line x1="88" y1="368.7" x2="916" y2="368.7"/>
    <line x1="88" y1="279.3" x2="916" y2="279.3"/>
    <line x1="88" y1="190.0" x2="916" y2="190.0"/>
    <line x1="88" y1="100.7" x2="916" y2="100.7"/>
  </g>
  <g fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="13">
    <text x="55" y="462">0</text>
    <text x="31" y="373">2,000</text>
    <text x="31" y="284">4,000</text>
    <text x="31" y="195">6,000</text>
    <text x="31" y="105">8,000</text>
  </g>
  <path d="M88.0,457.6 L295.0,415.1 L502.0,239.1 L709.0,164.9 L916.0,63.3" fill="none" stroke="#7c2d12" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#7c2d12" stroke="#f7f4ec" stroke-width="3">
    <circle cx="88" cy="457.6" r="7"/>
    <circle cx="295" cy="415.1" r="7"/>
    <circle cx="502" cy="239.1" r="7"/>
    <circle cx="709" cy="164.9" r="7"/>
    <circle cx="916" cy="63.3" r="7"/>
  </g>
  <g fill="#111111" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
    <text x="78" y="438">9</text>
    <text x="269" y="399">961</text>
    <text x="469" y="223">4,900</text>
    <text x="676" y="149">6,561</text>
    <text x="883" y="49">8,836</text>
  </g>
  <g fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="13">
    <text x="71" y="496">May 7</text>
    <text x="278" y="496">May 8</text>
    <text x="485" y="496">May 9</text>
    <text x="688" y="496">May 10</text>
    <text x="895" y="496">May 11</text>
  </g>
  <text x="88" y="520" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="12">Confirmed n = 94. n^2 = 8,836. Next confirmed ID adds 189 n^2 units.</text>
</svg>
